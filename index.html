<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>范进中举 · 课堂随机点名器</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: '楷体', '华文楷体', 'Microsoft YaHei', 'PingFang SC', serif;
            background: linear-gradient(160deg, #f5e6c8 0%, #e8d5a8 40%, #dcc088 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px;
            color: #3e2a1f;
            overflow-x: hidden;
        }

        /* 主容器 */
        .main-container {
            display: flex;
            gap: 24px;
            width: 100%;
            max-width: 1400px;
            min-height: calc(100vh - 40px);
        }

        /* 左侧面板 */
        .left-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 16px;
            min-width: 0;
        }

        /* 右侧面板 */
        .right-panel {
            width: 360px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
        }

        /* 装饰线 */
        .ornament {
            text-align: center;
            color: #b8956a;
            font-size: 1.2rem;
            letter-spacing: 12px;
            padding: 8px 0;
            border-bottom: 2px solid #c4a96e;
            margin-bottom: 4px;
        }

        /* 标题区 */
        .title-area {
            text-align: center;
            padding: 8px 0 12px;
        }
        .title-area h1 {
            font-size: 2.4rem;
            font-weight: 900;
            color: #5a3d2b;
            text-shadow: 1px 1px 0 #d4b896, 2px 2px 6px rgba(90,61,43,0.15);
            letter-spacing: 8px;
            margin-bottom: 6px;
        }
        .title-area .subtitle {
            font-size: 1.05rem;
            color: #8b6f4e;
            letter-spacing: 4px;
        }
        .title-area .tag {
            display: inline-block;
            background: #8b4513;
            color: #f5e6c8;
            padding: 3px 14px;
            border-radius: 16px;
            font-size: 0.8rem;
            margin-top: 8px;
            letter-spacing: 2px;
        }

        /* 提示语 */
        .hint-box {
            background: linear-gradient(135deg, #fff8ee 0%, #f0e4cc 100%);
            border: 1px solid #c4a96e;
            border-radius: 14px;
            padding: 14px 20px;
            text-align: center;
            font-size: 1rem;
            color: #6b4e35;
            line-height: 1.6;
            position: relative;
        }
        .hint-box .icon-left, .hint-box .icon-right {
            opacity: 0.5;
            font-size: 1.1rem;
        }

        /* 姓名显示区 */
        .display-area {
            background: linear-gradient(145deg, #fff8ee 0%, #f5e6c8 50%, #e8d5a8 100%);
            border: 3px solid #b8956a;
            border-radius: 20px;
            padding: 40px 24px;
            text-align: center;
            box-shadow: inset 0 2px 8px rgba(139,90,43,0.1), 0 8px 30px rgba(90,61,43,0.15);
            position: relative;
            min-height: 180px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .display-area::before, .display-area::after {
            content: "";
            position: absolute;
            width: 36px; height: 36px;
            border: 3px solid #b8956a;
        }
        .display-area::before {
            top: 10px; left: 10px;
            border-right: none; border-bottom: none;
            border-radius: 10px 0 0 0;
        }
        .display-area::after {
            bottom: 10px; right: 10px;
            border-left: none; border-top: none;
            border-radius: 0 0 10px 0;
        }

        #nameDisplay {
            font-size: 3.8rem;
            font-weight: 900;
            color: #5a3d2b;
            text-shadow: 2px 2px 0 #d4b896, 3px 3px 8px rgba(90,61,43,0.1);
            letter-spacing: 10px;
            transition: all 0.1s ease;
            min-height: 90px;
            display: flex;
            align-items: center;
            justify-content: center;
            word-break: keep-all;
            white-space: nowrap;
        }
        #nameDisplay.rolling {
            color: #b8956a;
            text-shadow: 1px 1px 0 #e8d5a8;
        }
        #nameDisplay.flash {
            animation: flashAnim 0.6s ease-out;
        }
        @keyframes flashAnim {
            0% { color: #5a3d2b; transform: scale(1); }
            25% { color: #c9302c; transform: scale(1.12); text-shadow: 0 0 20px rgba(201,48,44,0.4); }
            50% { color: #d4a017; transform: scale(1.04); }
            75% { color: #c9302c; transform: scale(1.08); }
            100% { color: #5a3d2b; transform: scale(1); }
        }
        .display-label {
            font-size: 0.85rem;
            color: #a08060;
            margin-top: 12px;
            letter-spacing: 3px;
        }

        /* 按钮区 - 关键修复：强制水平排列 */
        .btn-area {
            display: flex;
            flex-direction: row;
            gap: 16px;
            justify-content: center;
            align-items: center;
            padding: 8px 0;
            flex-wrap: nowrap;
        }
        .btn {
            font-family: '楷体', '华文楷体', 'Microsoft YaHei', serif;
            font-size: 1.25rem;
            font-weight: 700;
            padding: 12px 28px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.15s ease;
            letter-spacing: 3px;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .btn-start {
            background: linear-gradient(135deg, #8b4513 0%, #a0522d 100%);
            color: #f5e6c8;
            box-shadow: 0 5px 0 #5a2d0c, 0 6px 15px rgba(139,69,19,0.3);
        }
        .btn-start:hover { transform: translateY(-2px); box-shadow: 0 7px 0 #5a2d0c, 0 10px 20px rgba(139,69,19,0.4); }
        .btn-start:active { transform: translateY(2px); box-shadow: 0 3px 0 #5a2d0c, 0 4px 10px rgba(139,69,19,0.3); }
        .btn-stop {
            background: linear-gradient(135deg, #c9302c 0%, #d9534f 100%);
            color: #fff;
            box-shadow: 0 5px 0 #8b1a1a, 0 6px 15px rgba(201,48,44,0.3);
        }
        .btn-stop:hover { transform: translateY(-2px); box-shadow: 0 7px 0 #8b1a1a, 0 10px 20px rgba(201,48,44,0.4); }
        .btn-stop:active { transform: translateY(2px); box-shadow: 0 3px 0 #8b1a1a, 0 4px 10px rgba(201,48,44,0.3); }
        .btn-stop:disabled {
            background: #b0a090;
            box-shadow: 0 5px 0 #8a8070;
            cursor: not-allowed;
            transform: none;
        }
        .btn-reset {
            background: linear-gradient(135deg, #6b8e6b 0%, #8fbc8f 100%);
            color: #fff;
            box-shadow: 0 5px 0 #4a6b4a, 0 6px 15px rgba(107,142,107,0.3);
            font-size: 1.1rem;
            padding: 12px 22px;
        }
        .btn-reset:hover { transform: translateY(-2px); box-shadow: 0 7px 0 #4a6b4a, 0 10px 20px rgba(107,142,107,0.4); }
        .btn-reset:active { transform: translateY(2px); box-shadow: 0 3px 0 #4a6b4a, 0 4px 10px rgba(107,142,107,0.3); }

        /* 数据看板 */
        .stats-panel {
            background: linear-gradient(145deg, #fff8ee 0%, #f0e4cc 100%);
            border: 2px solid #c4a96e;
            border-radius: 18px;
            padding: 20px 16px;
            box-shadow: 0 8px 30px rgba(90,61,43,0.12);
            height: 100%;
            display: flex;
            flex-direction: column;
            min-height: 500px;
        }
        .stats-header {
            text-align: center;
            padding-bottom: 12px;
            border-bottom: 2px solid #d4b896;
            margin-bottom: 12px;
            flex-shrink: 0;
        }
        .stats-header h3 {
            font-size: 1.25rem;
            color: #5a3d2b;
            font-weight: 700;
            letter-spacing: 2px;
        }
        .stats-header .stats-sub {
            font-size: 0.8rem;
            color: #a08060;
            margin-top: 4px;
        }
        .stats-table-wrapper {
            flex: 1;
            overflow-y: auto;
            border-radius: 10px;
            border: 1px solid #d4b896;
            min-height: 0;
        }
        .stats-table-wrapper::-webkit-scrollbar { width: 6px; }
        .stats-table-wrapper::-webkit-scrollbar-track { background: #f0e4cc; border-radius: 3px; }
        .stats-table-wrapper::-webkit-scrollbar-thumb { background: #c4a96e; border-radius: 3px; }

        table { width: 100%; border-collapse: collapse; font-size: 0.95rem; }
        thead { position: sticky; top: 0; z-index: 10; }
        th {
            background: linear-gradient(135deg, #8b4513 0%, #a0522d 100%);
            color: #f5e6c8;
            padding: 10px 6px;
            font-weight: 700;
            letter-spacing: 2px;
            font-size: 0.9rem;
        }
        th:first-child { border-radius: 10px 0 0 0; }
        th:last-child { border-radius: 0 10px 0 0; }
        td {
            padding: 9px 6px;
            text-align: center;
            border-bottom: 1px solid #e0d0b8;
            color: #5a3d2b;
        }
        tr:nth-child(even) { background: rgba(212,184,150,0.12); }
        tr:hover { background: rgba(184,149,106,0.18); }
        tr.highlight-zero {
            background: linear-gradient(90deg, rgba(255,235,200,0.5) 0%, rgba(255,220,170,0.3) 100%) !important;
            font-weight: 700;
        }
        tr.highlight-zero td:first-child::before { content: "🌟 "; }
        .count-badge {
            display: inline-block;
            background: #8b4513;
            color: #f5e6c8;
            padding: 2px 10px;
            border-radius: 12px;
            font-weight: 700;
            min-width: 26px;
            font-size: 0.9rem;
        }
        .count-badge.zero { background: #c4a96e; color: #5a3d2b; }

        /* 底部信息 */
        .footer-info {
            text-align: center;
            padding: 12px 0 6px;
            font-size: 0.75rem;
            color: #a08060;
            letter-spacing: 1px;
            line-height: 1.7;
        }
        .footer-info .ai-tag {
            display: inline-block;
            background: linear-gradient(135deg, #8b4513 0%, #a0522d 100%);
            color: #f5e6c8;
            padding: 3px 12px;
            border-radius: 16px;
            font-size: 0.7rem;
            letter-spacing: 1px;
            margin-top: 6px;
        }

        /* ========== 响应式适配 ========== */

        /* 平板/小笔记本：右侧面板变窄 */
        @media (max-width: 1100px) {
            .right-panel { width: 300px; }
            #nameDisplay { font-size: 3.2rem; letter-spacing: 6px; }
            .title-area h1 { font-size: 2rem; letter-spacing: 6px; }
        }

        /* 平板竖屏/小屏幕：左右堆叠 */
        @media (max-width: 850px) {
            .main-container {
                flex-direction: column;
                align-items: center;
                max-width: 600px;
            }
            .right-panel {
                width: 100%;
                max-width: 600px;
            }
            .stats-panel { min-height: 350px; }
            #nameDisplay { font-size: 3rem; letter-spacing: 5px; }
            .title-area h1 { font-size: 1.8rem; letter-spacing: 4px; }
            .btn { font-size: 1.15rem; padding: 10px 22px; }
        }

        /* 手机 */
        @media (max-width: 550px) {
            body { padding: 12px; }
            .main-container { gap: 16px; }
            #nameDisplay { font-size: 2.2rem; letter-spacing: 3px; min-height: 70px; }
            .title-area h1 { font-size: 1.5rem; letter-spacing: 2px; }
            .title-area .subtitle { font-size: 0.9rem; }
            .display-area { padding: 28px 16px; min-height: 140px; }
            .btn-area { gap: 10px; }
            .btn { font-size: 1rem; padding: 10px 18px; letter-spacing: 2px; }
            .btn-reset { font-size: 0.95rem; padding: 10px 16px; }
            .hint-box { font-size: 0.9rem; padding: 12px 14px; }
            .stats-panel { padding: 14px 12px; min-height: 300px; }
            th, td { padding: 7px 4px; font-size: 0.85rem; }
            .stats-header h3 { font-size: 1.1rem; }
        }

        /* 超小屏手机 */
        @media (max-width: 380px) {
            .btn-area { flex-wrap: wrap; }
            .btn { font-size: 0.95rem; padding: 9px 14px; }
            #nameDisplay { font-size: 1.8rem; letter-spacing: 2px; }
            .title-area h1 { font-size: 1.3rem; }
        }

        /* 超大屏幕优化 */
        @media (min-width: 1600px) {
            .main-container { max-width: 1600px; gap: 40px; }
            .right-panel { width: 420px; }
            #nameDisplay { font-size: 4.5rem; }
            .title-area h1 { font-size: 3rem; }
            .btn { font-size: 1.4rem; padding: 14px 36px; }
        }
    </style>
<base target="_blank">
</head>
<body>
    <div class="main-container">
        <!-- 左侧面板 -->
        <div class="left-panel">
            <div class="ornament">◆ ◆ ◆</div>

            <div class="title-area">
                <h1>范进中举</h1>
                <div class="subtitle">课堂随机点名器</div>
                <div class="tag">《儒林外史》第三回</div>
            </div>

            <div class="hint-box" id="hintBox">
                <span class="icon-left">📜</span>
                中举之后，谁来说说胡屠户的前倨后恭？
                <span class="icon-right">📜</span>
            </div>

            <div class="display-area">
                <div id="nameDisplay">准备就绪</div>
                <div class="display-label">— 点击「开始滚动」抽取幸运学子 —</div>
            </div>

            <div class="btn-area">
                <button class="btn btn-start" id="startBtn">▶ 开始滚动</button>
                <button class="btn btn-stop" id="stopBtn" disabled>■ 停止提问</button>
                <button class="btn btn-reset" id="resetBtn">↺ 重置记录</button>
            </div>

            <div class="footer-info">
                <div>点击「开始滚动」后姓名快速轮换，点击「停止提问」锁定被点名学生</div>
                <div class="ai-tag">🤖 AI生成课堂互动工具 · 数据驱动教学决策</div>
            </div>
        </div>

        <!-- 右侧面板 -->
        <div class="right-panel">
            <div class="stats-panel">
                <div class="stats-header">
                    <h3>📋 提问数据看板</h3>
                    <div class="stats-sub">实时记录 · 动态排序 · 关注未提问学生</div>
                </div>
                <div class="stats-table-wrapper">
                    <table>
                        <thead>
                            <tr><th>排名</th><th>学生姓名</th><th>提问次数</th></tr>
                        </thead>
                        <tbody id="statsBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ===================== 班级名单 =====================
        const studentNames = [
            "陈子轩", "李静怡", "王浩然", "张雨桐", "刘子涵",
            "赵一凡", "周若涵", "吴子琪", "郑乐怡", "林宇轩",
            "郭佳怡", "唐雅昕", "沈梦晨", "宋子豪", "韩佳怡"
        ];
        // ==================================================

        const hintTexts = [
            "中举之后，谁来说说胡屠户的前倨后恭？",
            "范进发疯时，作者用了哪些细节描写？",
            "张乡绅送银送房，反映了怎样的官场生态？",
            "'噫！好了！我中了！'这句话有何深意？",
            "众邻居前后态度的变化，作者用了什么手法？",
            "胡屠户打范进后手疼，这一细节有何讽刺意味？",
            "科举制度对范进造成了怎样的精神毒害？",
            "范进卖鸡时的动作描写，反映了他怎样的心理？",
            "张乡绅与范进互称'世先生'，这体现了什么？",
            "本文的对比手法有哪些？请举例说明。"
        ];

        let rollingInterval = null;
        let isRolling = false;
        let askCount = {};
        let currentName = "准备就绪";

        const nameDisplay = document.getElementById('nameDisplay');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const resetBtn = document.getElementById('resetBtn');
        const statsBody = document.getElementById('statsBody');
        const hintBox = document.getElementById('hintBox');

        function initCounts() {
            studentNames.forEach(name => { askCount[name] = 0; });
        }

        function updateHint() {
            const hint = hintTexts[Math.floor(Math.random() * hintTexts.length)];
            hintBox.innerHTML = '<span class="icon-left">📜</span> ' + hint + ' <span class="icon-right">📜</span>';
        }

        function updateStatsTable() {
            statsBody.innerHTML = '';
            const sorted = [...studentNames].sort((a, b) => askCount[b] - askCount[a]);
            sorted.forEach((name, index) => {
                const row = document.createElement('tr');
                const count = askCount[name];
                if (count === 0) row.classList.add('highlight-zero');
                row.innerHTML = '<td>' + (index + 1) + '</td><td>' + name + '</td><td><span class="count-badge ' + (count === 0 ? 'zero' : '') + '">' + count + '</span></td>';
                statsBody.appendChild(row);
            });
        }

        function getRandomStudent() {
            return studentNames[Math.floor(Math.random() * studentNames.length)];
        }

        function startRolling() {
            if (isRolling) return;
            isRolling = true;
            startBtn.disabled = true;
            stopBtn.disabled = false;
            nameDisplay.classList.add('rolling');
            nameDisplay.classList.remove('flash');
            rollingInterval = setInterval(function() {
                currentName = getRandomStudent();
                nameDisplay.textContent = currentName;
            }, 55);
            updateHint();
        }

        function stopRolling() {
            if (!isRolling) return;
            clearInterval(rollingInterval);
            rollingInterval = null;
            isRolling = false;
            startBtn.disabled = false;
            stopBtn.disabled = true;
            nameDisplay.classList.remove('rolling');
            if (!studentNames.includes(currentName)) {
                currentName = getRandomStudent();
                nameDisplay.textContent = currentName;
            }
            askCount[currentName]++;
            nameDisplay.classList.add('flash');
            setTimeout(function() { nameDisplay.classList.remove('flash'); }, 600);
            updateStatsTable();
        }

        function resetStats() {
            initCounts();
            updateStatsTable();
            currentName = "准备就绪";
            nameDisplay.textContent = currentName;
            nameDisplay.classList.remove('rolling', 'flash');
            if (isRolling) {
                clearInterval(rollingInterval);
                rollingInterval = null;
                isRolling = false;
                startBtn.disabled = false;
                stopBtn.disabled = true;
            }
        }

        startBtn.addEventListener('click', startRolling);
        stopBtn.addEventListener('click', stopRolling);
        resetBtn.addEventListener('click', resetStats);

        document.addEventListener('keydown', function(e) {
            if (e.code === 'Space') {
                e.preventDefault();
                if (isRolling) stopRolling(); else startRolling();
            }
            if (e.code === 'KeyR' && e.ctrlKey) {
                e.preventDefault();
                resetStats();
            }
        });

        initCounts();
        updateStatsTable();
    </script>
</body>
</html>
